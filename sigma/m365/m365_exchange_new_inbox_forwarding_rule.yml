title: M365 Inbox Rule Forwarding Mail Externally
id: 9fc5ed8d-13be-4cf4-b41c-534d324c8488
status: experimental
description: |
  Detects creation or modification of a mailbox inbox rule that forwards or redirects
  mail. After a business email compromise, attackers commonly add a hidden forwarding
  rule to silently exfiltrate mail and maintain visibility — a top BEC indicator for
  Thai enterprises on Microsoft 365.
references:
  - https://attack.mitre.org/techniques/T1114/003/
author: Nattapong Suraraungchai
date: 2026-06-01
tags:
  - attack.collection
  - attack.exfiltration
  - attack.t1114.003
  - ecop.region.th
logsource:
  product: m365
  service: exchange
detection:
  selection_op:
    Operation:
      - 'New-InboxRule'
      - 'Set-InboxRule'
  selection_fwd:
    Parameters|contains:
      - 'ForwardTo'
      - 'RedirectTo'
      - 'ForwardAsAttachmentTo'
  condition: selection_op and selection_fwd
falsepositives:
  - ผู้ใช้ตั้ง forwarding ไปเมลส่วนตัว/ทีมโดยตั้งใจ (ตรวจว่าปลายทางเป็นโดเมนภายนอกองค์กรหรือไม่)
level: high
