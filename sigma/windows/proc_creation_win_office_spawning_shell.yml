title: Office Application Spawning a Command Shell
id: cffb5439-2f86-48f6-9676-886fd5e12227
status: experimental
description: |
  Detects Microsoft Office applications (Word/Excel/PowerPoint/Outlook) spawning a
  command interpreter or script host. This parent-child relationship is a strong
  indicator of malicious macro execution in a phishing document — a primary initial
  access vector against Thai banking and enterprise users.
references:
  - https://attack.mitre.org/techniques/T1204/002/
  - https://attack.mitre.org/techniques/T1566/001/
author: Nattapong Suraraungchai
date: 2026-06-01
tags:
  - attack.execution
  - attack.t1204.002
  - ecop.sector.finance
  - ecop.region.th
logsource:
  category: process_creation
  product: windows
detection:
  selection_parent:
    ParentImage|endswith:
      - '\winword.exe'
      - '\excel.exe'
      - '\powerpnt.exe'
      - '\outlook.exe'
      - '\mspub.exe'
  selection_child:
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\mshta.exe'
      - '\rundll32.exe'
  condition: selection_parent and selection_child
falsepositives:
  - Add-in หรือ template ขององค์กรบางตัวที่เรียก script ถูกต้องตามงาน (พบไม่บ่อย — ควร baseline แล้ว whitelist)
level: high
