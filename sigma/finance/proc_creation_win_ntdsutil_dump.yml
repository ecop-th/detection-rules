title: NTDS.dit Extraction via ntdsutil
id: 6459a4c4-8ed7-4e94-a3aa-d462a497c499
status: experimental
description: |
  Detects use of ntdsutil "ifm" (Install From Media) to dump the Active Directory
  database (NTDS.dit), which contains every domain credential. A critical sign of
  hands-on-keyboard attackers attempting full domain compromise — extremely high
  impact on financial-sector domain controllers.
references:
  - https://attack.mitre.org/techniques/T1003/003/
author: Nattapong Suraraungchai
date: 2026-06-01
tags:
  - attack.credential-access
  - attack.t1003.003
  - ecop.sector.finance
  - ecop.region.th
logsource:
  category: process_creation
  product: windows
detection:
  selection_ntdsutil:
    Image|endswith: '\ntdsutil.exe'
    CommandLine|contains: 'ifm'
  selection_create:
    CommandLine|contains|all:
      - 'create full'
      - 'ntds'
  condition: selection_ntdsutil or selection_create
falsepositives:
  - การสร้าง IFM media เพื่อ promote DC ใหม่โดย admin (พบไม่บ่อย — ควรยืนยันว่ามี change ที่วางแผนไว้)
level: critical
