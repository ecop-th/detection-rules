title: Windows Event Log Cleared via wevtutil
id: 02e84b70-dd36-42bb-8891-d980155303b6
status: experimental
description: |
  Detects clearing of Windows event logs using wevtutil "cl"/"clear-log" or
  PowerShell Clear-EventLog. Adversaries clear logs to destroy evidence of their
  activity (anti-forensics) — this should almost always be investigated.
references:
  - https://attack.mitre.org/techniques/T1070/001/
author: Nattapong Suraraungchai
date: 2026-06-01
tags:
  - attack.defense-evasion
  - attack.t1070.001
  - ecop.region.asean
logsource:
  category: process_creation
  product: windows
detection:
  selection_wevtutil:
    Image|endswith: '\wevtutil.exe'
    CommandLine|contains:
      - ' cl '
      - 'clear-log'
  selection_ps:
    CommandLine|contains:
      - 'Clear-EventLog'
      - 'Limit-EventLog'
  condition: selection_wevtutil or selection_ps
falsepositives:
  - การล้าง log โดย admin ตอน maintenance (ควรมี change ticket รองรับ — ถ้าไม่มี ถือว่าน่าสงสัย)
level: high
