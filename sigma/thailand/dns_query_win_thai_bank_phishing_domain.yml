title: Thai Banking Phishing / Brand-Impersonation Domain (watchlist template)
id: fccb0689-7583-4b05-84e3-45b4bb0bc503
status: experimental
description: |
  Detects DNS queries to domains that impersonate Thai banking services — using
  generic Thai-financial lure tokens plus an ORG-CONFIGURABLE brand watch-list.

  ⚠️ โดยตั้งใจ: rule นี้ "ไม่ระบุชื่อธนาคารจริง" ในเวอร์ชันสาธารณะ — เพราะการใส่ชื่อแบรนด์/
  ลูกค้าลงใน public repo อาจถูก brand-monitoring/DRP ของเจ้าของแบรนด์ตรวจพบ และดูเป็นภาพลบ
  ให้เพิ่มแบรนด์ที่ "องค์กรของคุณ" ต้องการเฝ้าระวังใน private deployment ของคุณเอง
  (ECOP ดูแล watch-list สดให้ลูกค้าผ่าน XIPHER DRP แบบ private)
references:
  - https://attack.mitre.org/techniques/T1566/002/
  - https://www.bot.or.th/   # Bank of Thailand consumer-fraud advisories
author: Nattapong Suraraungchai
date: 2026-06-02
tags:
  - attack.initial-access
  - attack.t1566.002
  - ecop.sector.finance
  - ecop.region.th
logsource:
  category: dns_query
  product: windows
detection:
  selection_thai_financial:
    # โทเคน Thai-financial ทั่วไป (ไม่ใช่ชื่อแบรนด์/ลูกค้า) — ปลอดภัยที่จะ public
    QueryName|contains:
      - 'promptpay'
      - 'mobilebanking'
      - 'internetbanking'
      - 'ibanking'
      - 'thaibank'
  selection_watchlist:
    # 🔧 ปรับที่นี่ใน private fork ของคุณ — เพิ่มแบรนด์ที่ "องค์กรคุณ" เฝ้าระวัง
    # ❌ ห้ามใส่ชื่อลูกค้า/แบรนด์ของผู้อื่นในเวอร์ชันสาธารณะ
    QueryName|contains:
      - 'examplebank'   # ← placeholder แทนด้วยแบรนด์ของคุณเอง
  filter_official:
    QueryName|endswith:
      - '.promptpay.io'
      - '.examplebank.com'   # ← โดเมนทางการของแบรนด์ใน watch-list
  condition: (selection_thai_financial or selection_watchlist) and not filter_official
falsepositives:
  - บริการ/พาร์ทเนอร์ที่มีโทเคนเหล่านี้ในโดเมนโดยชอบ (เพิ่มเข้า filter_official)
level: high
