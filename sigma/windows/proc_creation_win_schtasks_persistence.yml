title: Scheduled Task Creation via schtasks
id: ecb8e6bb-f7cb-42c2-9fba-8e02db45b419
status: experimental
description: |
  Detects creation of a scheduled task with schtasks.exe /create. Attackers use
  scheduled tasks for persistence and to run payloads as SYSTEM or at logon.
  Tune with an allow-list of known administrative task names in your environment.
references:
  - https://attack.mitre.org/techniques/T1053/005/
author: Nattapong Suraraungchai
date: 2026-06-01
tags:
  - attack.persistence
  - attack.execution
  - attack.t1053.005
  - ecop.region.asean
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
    - Image|endswith: '\schtasks.exe'
    - OriginalFileName: 'schtasks.exe'
  selection_create:
    CommandLine|contains: '/create'
  filter_known:
    CommandLine|contains:
      - '\Microsoft\Windows\'   # งานในระบบของ Windows เอง (ปรับตาม baseline)
  condition: selection_img and selection_create and not filter_known
falsepositives:
  - ซอฟต์แวร์/agent ที่ติดตั้งงานตามตารางตอน setup (ควร baseline ชื่อ task และ parent ที่รู้จัก)
level: medium
