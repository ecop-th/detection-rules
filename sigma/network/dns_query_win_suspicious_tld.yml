title: DNS Query to Suspicious / Abuse-Prone TLDs
id: b01c3a09-6c4b-47ed-9324-3ca6da83285a
status: experimental
description: |
  Detects DNS queries to top-level domains that are disproportionately abused for
  malware C2, phishing, and throwaway infrastructure (free or very cheap TLDs).
  A low-signal-per-event rule best used for hunting and correlation, not standalone
  blocking.
references:
  - https://attack.mitre.org/techniques/T1071/004/
author: Nattapong Suraraungchai
date: 2026-06-01
tags:
  - attack.command-and-control
  - attack.t1071.004
  - ecop.region.asean
logsource:
  category: dns_query
  product: windows
detection:
  selection:
    QueryName|endswith:
      - '.tk'
      - '.gq'
      - '.ml'
      - '.cf'
      - '.top'
      - '.xyz'
      - '.work'
      - '.zip'
  condition: selection
falsepositives:
  - บางธุรกิจใช้โดเมนบน TLD เหล่านี้โดยชอบ (ใช้คู่กับ correlation อื่น เช่น parent process น่าสงสัย)
level: medium
