name: Update Rule Stats

# อัปเดตตัวเลขใน README + badge อัตโนมัติทุกครั้งที่ rule เปลี่ยน
# - .stats.json (badge "rules N")
# - README: At a glance + Coverage map (ระหว่าง marker STATS/COVERAGE)

on:
  push:
    branches: [main]
    paths:
      - 'sigma/**'
      - 'emerging-threats/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install pyyaml

      - name: Regenerate .stats.json
        run: |
          COUNT=$(find sigma emerging-threats -name '*.yml' 2>/dev/null | wc -l | tr -d ' ')
          printf '{ "count": %s }\n' "$COUNT" > .stats.json
          echo "rule count = $COUNT"

      - name: Regenerate README numbers (At a glance + Coverage)
        run: python .github/scripts/gen_readme.py

      - name: Commit if changed
        run: |
          if git diff --quiet .stats.json README.md; then
            echo "ไม่มีการเปลี่ยนแปลง — ข้าม"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .stats.json README.md
          git commit -m "chore: auto-update README stats + rule count [skip ci]"
          git push
