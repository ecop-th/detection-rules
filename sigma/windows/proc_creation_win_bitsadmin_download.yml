title: BITSAdmin Transfer Download
id: 8c5a2d88-a636-40ab-b2d8-c09e60097b12
status: experimental
description: |
  Detects bitsadmin.exe being used to download files via a BITS transfer job.
  Attackers abuse BITS to pull payloads stealthily because transfers survive
  reboots and blend in with legitimate Windows update traffic.
references:
  - https://attack.mitre.org/techniques/T1197/
  - https://lolbas-project.github.io/lolbas/Binaries/Bitsadmin/
author: Nattapong Suraraungchai
date: 2026-06-01
tags:
  - attack.defense-evasion
  - attack.persistence
  - attack.t1197
  - ecop.region.asean
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
    - Image|endswith: '\bitsadmin.exe'
    - OriginalFileName: 'bitsadmin.exe'
  selection_flags:
    CommandLine|contains:
      - '/transfer'
      - '/create'
      - '/addfile'
  condition: selection_img and selection_flags
falsepositives:
  - สคริปต์ deployment / patch ภายในองค์กรที่ใช้ BITS (ควร baseline parent และปลายทาง URL ที่รู้จัก)
level: medium
