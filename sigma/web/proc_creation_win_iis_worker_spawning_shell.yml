title: IIS Worker Process Spawning a Command Shell
id: d2791e9e-0a8b-4775-9937-52a88a379b0f
status: experimental
description: |
  Detects the IIS worker process (w3wp.exe) or an Apache/PHP/Java web process
  spawning a command interpreter. This is a high-confidence sign that a webshell
  is being executed on the server — the active-exploitation stage following a
  successful webshell upload.
references:
  - https://attack.mitre.org/techniques/T1505/003/
  - https://attack.mitre.org/techniques/T1190/
author: Nattapong Suraraungchai
date: 2026-06-01
tags:
  - attack.persistence
  - attack.t1505.003
  - ecop.sector.gov
  - ecop.region.th
logsource:
  category: process_creation
  product: windows
detection:
  selection_parent:
    ParentImage|endswith:
      - '\w3wp.exe'
      - '\httpd.exe'
      - '\php-cgi.exe'
      - '\tomcat.exe'
  selection_child:
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\net.exe'
      - '\whoami.exe'
  condition: selection_parent and selection_child
falsepositives:
  - เว็บแอปบางตัวที่เรียก command line โดยตั้งใจ (ควร baseline แล้ว whitelist คำสั่งที่รู้จัก)
level: high
