name: Monthly Rule Reminder

# เปิด issue เตือนให้เติม rule ใหม่ทุกเดือน — กลไกกัน repo ตาย (ความเสี่ยง #1)
# ทำงานบน GitHub ล้วน ไม่พึ่งระบบภายนอก

on:
  schedule:
    - cron: '0 2 1 * *'   # วันที่ 1 ของเดือน 02:00 UTC (09:00 ไทย)
  workflow_dispatch:

permissions:
  issues: write

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Open monthly rule-drop issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MONTH=$(date +'%Y-%m')
          gh issue create --repo "${{ github.repository }}" \
            --title "🗓️ Monthly Rule Drop — $MONTH" \
            --body "$(cat <<'EOF'
          ## เป้าหมายเดือนนี้: เติม detection rule ใหม่ 1–2 ตัว

          > rule repo ที่ไม่อัปเดตทำลายแบรนด์มากกว่าไม่ทำเลย — checklist นี้กัน repo ตาย

          ### ขั้นตอน
          - [ ] เช็ก **[CISA KEV](https://www.cisa.gov/known-exploited-vulnerabilities-catalog)** หา CVE ที่ถูกใช้โจมตีจริงเดือนนี้
          - [ ] สแกนข่าว threat ที่เกี่ยวกับ **ภาคการเงิน / อาเซียน** (banking trojan, BEC, ransomware, web defacement)
          - [ ] เลือก 1–2 threat ที่ repo ยังไม่มี rule
          - [ ] เขียน Sigma rule ตามมาตรฐาน ([CONTRIBUTING.md](../blob/main/CONTRIBUTING.md))
          - [ ] รัน `python3 .github/scripts/lint_metadata.py` ให้ผ่าน
          - [ ] เพิ่ม sample log ใน `tests/`
          - [ ] อัปเดต `CHANGELOG.md`
          - [ ] เปิด PR → review → merge

          ### ไอเดียถ้านึกไม่ออก
          - CVE ระดับ KEV ที่เพิ่งออก → `emerging-threats/`
          - TTP ของ threat actor ใน [`threat-actors/`](../blob/main/threat-actors) ที่ยังครอบไม่ครบ
          - Cloud/identity (M365/Azure AD) เพิ่มเติม

          _issue นี้สร้างอัตโนมัติโดย Monthly Rule Reminder workflow_
          EOF
          )"
