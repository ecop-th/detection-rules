title: PowerShell Encoded Command Execution
id: 007c0836-50a0-428d-a6e0-e936d1bb1749
status: experimental
description: |
  Detects PowerShell launched with an encoded command (-EncodedCommand / -enc).
  Base64-encoded commands are a hallmark of phishing chains and post-exploitation
  tooling that try to hide the real payload from casual log review.
references:
  - https://attack.mitre.org/techniques/T1059/001/
author: Nattapong Suraraungchai
date: 2026-06-01
tags:
  - attack.execution
  - attack.t1059.001
  - ecop.sector.finance
  - ecop.region.asean
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
    - Image|endswith: '\powershell.exe'
    - Image|endswith: '\pwsh.exe'
    - OriginalFileName: 'PowerShell.EXE'
  selection_flag:
    CommandLine|contains:
      - ' -enc '
      - ' -encodedcommand'
      - ' -ec '
      - ' -e '
  condition: selection_img and selection_flag
falsepositives:
  - เครื่องมือ admin / software deployment บางตัวใช้ encoded command (ควร baseline แล้ว whitelist parent ที่รู้จัก)
level: high
