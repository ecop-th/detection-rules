name: Secret & PII Scan

# ด่านที่ 2 (นอกจาก pre-commit ในเครื่อง) — กันกรณีคนไม่ได้ติดตั้ง pre-commit
# สแกนทั้ง history เพื่อจับความลับ/PII/ข้อมูล internal ที่หลุดเข้ามา

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # ต้องดึง history เต็มเพื่อสแกนย้อนหลัง

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # required for PR scans
