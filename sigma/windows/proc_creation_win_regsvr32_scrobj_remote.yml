title: Regsvr32 Remote Scriptlet Execution (Squiblydoo)
id: bbbe19d4-5421-4b77-8288-a08e3d967525
status: experimental
description: |
  Detects the Squiblydoo technique — regsvr32.exe loading a remote scriptlet (.sct)
  via scrobj.dll to bypass application allow-listing. Frequently used to execute
  attacker code without writing a PE to disk.
references:
  - https://attack.mitre.org/techniques/T1218/010/
  - https://lolbas-project.github.io/lolbas/Binaries/Regsvr32/
author: Nattapong Suraraungchai
date: 2026-06-01
tags:
  - attack.defense-evasion
  - attack.t1218.010
  - ecop.region.asean
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
    - Image|endswith: '\regsvr32.exe'
    - OriginalFileName: 'REGSVR32.EXE'
  selection_remote:
    CommandLine|contains:
      - 'scrobj'
      - '/i:http'
      - '/i:ftp'
      - '.sct'
  condition: selection_img and selection_remote
falsepositives:
  - แอปติดตั้งบางตัวลงทะเบียน COM scriptlet ภายใน (มักเป็น local path ไม่ใช่ http/ftp)
level: high
