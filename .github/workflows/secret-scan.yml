name: Secret & PII Scan

# สแกน secret/PII/ข้อมูล internal ที่อาจหลุดเข้ามา
# ใช้ gitleaks "binary" ตรง ๆ (MIT, ฟรี) — ไม่ใช่ gitleaks-action ที่บังคับ license สำหรับ org

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # ดึง history เต็มเพื่อสแกนย้อนหลัง

      - name: Install gitleaks (binary)
        run: |
          VER=8.24.3
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan git history
        run: gitleaks git . --config .gitleaks.toml --redact --verbose --exit-code 1
