title: PsExec-style Lateral Movement Service
id: 0897fc78-823d-46fc-bdf8-5cc585ad1be6
status: experimental
description: |
  Detects indicators of PsExec-style remote execution: the PSEXESVC service image
  or the characteristic command line used to run code on remote hosts. Lateral
  movement with PsExec is a common step for attackers spreading through a banking
  network after initial credential theft.
references:
  - https://attack.mitre.org/techniques/T1021/002/
  - https://attack.mitre.org/techniques/T1570/
author: Nattapong Suraraungchai
date: 2026-06-01
tags:
  - attack.lateral-movement
  - attack.t1021.002
  - ecop.sector.finance
  - ecop.region.th
logsource:
  category: process_creation
  product: windows
detection:
  selection_svc:
    Image|endswith: '\PSEXESVC.exe'
  selection_cmd:
    CommandLine|contains:
      - 'psexec'
      - '\\\\'           # UNC remote target
    CommandLine|contains|all:
      - '-s'
      - 'accepteula'
  condition: selection_svc or selection_cmd
falsepositives:
  - ทีม IT ใช้ PsExec เพื่อบริหารเครื่องระยะไกลโดยชอบ (ควร baseline เครื่องต้นทาง/บัญชีที่ได้รับอนุญาต)
level: high
