title: Windows Service Creation via sc.exe
id: 938392f3-796b-4930-84d1-43a2f5d80efa
status: experimental
description: |
  Detects creation of a new Windows service with sc.exe create. Service creation
  is a common persistence and privilege-escalation primitive, and is also used by
  remote-exec tools (e.g. PsExec-style) to run payloads as SYSTEM.
references:
  - https://attack.mitre.org/techniques/T1543/003/
author: Nattapong Suraraungchai
date: 2026-06-01
tags:
  - attack.persistence
  - attack.privilege-escalation
  - attack.t1543.003
  - ecop.region.asean
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
    - Image|endswith: '\sc.exe'
    - OriginalFileName: 'sc.exe'
  selection_cmd:
    CommandLine|contains|all:
      - 'create'
      - 'binpath'
  condition: selection_img and selection_cmd
falsepositives:
  - การติดตั้งซอฟต์แวร์/driver ที่สร้าง service จริง (ควรตรวจ binPath ที่ชี้ไป temp/public/path แปลก ๆ)
level: medium
