title: WMIC Process Call Create
id: 37de9734-542e-486e-9aa3-5faff38ebb1d
status: experimental
description: |
  Detects wmic.exe spawning a new process via "process call create", optionally on
  a remote node (/node:). Used for both local execution and lateral movement to
  run commands on other hosts without dropping tooling.
references:
  - https://attack.mitre.org/techniques/T1047/
author: Nattapong Suraraungchai
date: 2026-06-01
tags:
  - attack.execution
  - attack.lateral-movement
  - attack.t1047
  - ecop.region.asean
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
    - Image|endswith: '\wmic.exe'
    - OriginalFileName: 'wmic.exe'
  selection_cmd:
    CommandLine|contains|all:
      - 'process'
      - 'call'
      - 'create'
  condition: selection_img and selection_cmd
falsepositives:
  - สคริปต์ดูแลระบบบางตัวใช้ wmic process call create จริง (ตรวจ /node: ที่ชี้ไปเครื่องอื่นเป็นสัญญาณ lateral)
level: high
